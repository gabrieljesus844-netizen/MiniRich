<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>Guia Financeiro</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="calculator-container">

<h1 id="titulo"></h1>

<p id="conteudo"></p>

</div>

<script src="guias-data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

const guia = guias[id];

document.getElementById("titulo").innerText = guia.titulo;

document.getElementById("conteudo").innerText = guia.conteudo;

</script>

</body>
</html>
