<script src="guias/guias-data.js"></script>

<script>

const container = document.getElementById("lista-guias");

for (let id in guias){

const guia = guias[id];

const card = document.createElement("a");

card.href = "guias/guia.html?id=" + id;

card.className = "card";

card.innerHTML = `
<h3>${guia.titulo}</h3>
<p>${guia.conteudo.substring(0,80)}...</p>
`;

container.appendChild(card);

}

</script>
